<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iPhone 17 Pro</title>
  <!-- // AJOUT : Préconnexion Google Fonts pour l'horloge style iOS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- // AJOUT : Préconnexion Google Fonts pour l'horloge style iOS -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- // AJOUT : Police Google Fonts proche du rendu iOS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- // MODIFICATION : Le CSS est maintenant séparé dans style.css -->
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <!-- Lien vers le manifest -->
<link rel="manifest" href="manifest.json">

<!-- Support iOS pour l'icône sur l'écran d'accueil -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/831/831276.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  <!-- // MODIFICATION : Le JavaScript est maintenant séparé dans script.js -->
  <script src="script.js" defer></script>
</head>

<style>
  body {
  background: #f5f5f7;
  align-items: center;
  justify-content: center;
  height: 100vh;
  display: flex;
  margin: 0;
}

.iphone {
  background: black;
  width: 300px;
  height: 600px;
  border-radius: 55px;
  border: solid #32374A;
  padding: 4px;
  position: relative; 
}

.screen {
  background: url("https://cdn.osxdaily.com/wp-content/uploads/2025/07/iOS-26-Wallpaper-Sky-Light.jpg") center/cover;
  width: 300px;
  height: 600px;
  border-radius: 50px;
  position: relative; 
  overflow: hidden; 
  transition: background 0.3s ease; 
}

.dynamic-island {
  background: black;
  width: 110px;
  height: 35px;
  border-radius: 55px;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  position: absolute;
  transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-sizing: border-box;
  z-index: 999;
  padding: 0 10px;
}

/* // MODIFICATION : Ajustement des tons pour un mauve plus réaliste et ajout d'un aspect vitré */
.camera-lens {
  width: 11px;
  height: 11px;
  background: radial-gradient(circle at 30% 30%, #3e2a52 0%, #150a20 50%, #000 100%);
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: inset 0 0 4px rgba(255, 255, 255, 0.2), 0 0 2px rgba(0,0,0,0.5);
  position: absolute;
  right: 12px;
  z-index: 1000;
}

/* // AJOUT : Reflet style verre pour la lentille */
.camera-lens::before {
  content: '';
  position: absolute;
  top: 1px;
  left: 1px;
  width: 4px;
  height: 4px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 50%;
}

.camera-lens::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 3px;
  height: 3px;
  background: rgba(180, 160, 220, 0.25);
  border-radius: 50%;
}

.dynamic-island-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0 24px 0 14px; 
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 11px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.2s ease;
  white-space: nowrap;
  box-sizing: border-box;
}

.dynamic-island.expanded {
  width: 190px; 
  height: 35px;
}

.dynamic-island.expanded .dynamic-island-content {
  opacity: 1;
}

.hw-button {
  position: absolute;
  background: #32374A; 
  border-radius: 4px;
  cursor: pointer;
  z-index: 10;
  transition: transform 0.1s ease, background-color 0.2s;
}

.hw-button:active {
  transform: scale(0.85);
  background: #232633;
}

.btn-action { left: -6px; top: 100px; width: 6px; height: 16px; border-radius: 3px 0 0 3px; }
.btn-vol-up { left: -6px; top: 135px; width: 6px; height: 38px; border-radius: 3px 0 0 3px; }
.btn-vol-down { left: -6px; top: 185px; width: 6px; height: 38px; border-radius: 3px 0 0 3px; }
.btn-power { right: -6px; top: 150px; width: 6px; height: 60px; border-radius: 0 3px 3px 0; }

.status-bar {
  position: absolute;
  top: 6px;
  left: 0;
  width: 100%;
  padding: 0 24px;
  box-sizing: border-box;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  font-weight: 600;
  z-index: 5;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.status-bar.hidden {
  opacity: 0;
}

#statusTime {
  position: relative;
  top: 14px;
  font-weight: 600;
  font-size: 15px;
}

.status-icons {
  display: flex;
  align-items: center;
  position: relative;
  top: 12px;
  gap: 5px;
}

.status-icons ion-icon {
  font-size: 16px;
}

/* // AJOUT : Grande horloge centrée style écran verrouillé iOS */
.lock-clock {
  position: absolute;
  top: 108px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  text-align: center;
  color: white;
  font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 74px;
  line-height: 0.9;
  font-weight: 600;
  letter-spacing: -4px;
  z-index: 4;
  pointer-events: none;
  text-shadow: 0 2px 14px rgba(0, 0, 0, 0.28);
  transition: opacity 0.3s ease;
}

/* // AJOUT : Conteneur des raccourcis torche et caméra en bas de l'écran */
.lockscreen-shortcuts {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 48px;
  padding: 0 34px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 5;
  transition: opacity 0.3s ease;
}

/* // MODIFICATION : Ajout d'une transition plus complète pour les animations d'appui prolongé */
.shortcut-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.18);
  border: 1px solid rgba(255, 255, 255, 0.22);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.25), 0 8px 22px rgba(0, 0, 0, 0.18);
  transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
  position: relative;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* // AJOUT : Cercle de progression visuelle pendant l'appui prolongé */
.shortcut-btn::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.75);
  opacity: 0;
  transform: scale(0.65);
  pointer-events: none;
}

/* // AJOUT : Animation de maintien 0.3s pour les icônes torche et caméra */
.shortcut-btn.pressing {
  transform: scale(0.84);
  background: rgba(255, 255, 255, 0.30);
}

/* // AJOUT : Animation du cercle pendant l'appui prolongé */
.shortcut-btn.pressing::after {
  opacity: 1;
  animation: holdProgress 0.3s linear forwards;
}

/* // AJOUT : État actif de la torche */
.shortcut-btn.active {
  background: rgba(255, 255, 255, 0.92);
  color: #111;
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.65), 0 0 28px rgba(255, 255, 210, 0.95);
}

/* // AJOUT : Animation de validation après appui prolongé */
.shortcut-btn.confirmed {
  animation: shortcutPop 0.28s ease;
}

/* // AJOUT : Animation de progression de l'appui prolongé */
@keyframes holdProgress {
  from {
    transform: scale(0.65);
    opacity: 0.35;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

/* // AJOUT : Animation de confirmation type iOS */
@keyframes shortcutPop {
  0% {
    transform: scale(0.84);
  }
  55% {
    transform: scale(1.12);
  }
  100% {
    transform: scale(1);
  }
}

/* // AJOUT : Taille des icônes torche et caméra */
.shortcut-btn ion-icon {
  font-size: 23px;
  filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.25));
  position: relative;
  z-index: 1;
}

/* // AJOUT : Effet d'appui sur les raccourcis */
.shortcut-btn:active {
  transform: scale(0.88);
  background: rgba(255, 255, 255, 0.28);
}

.swipe-bar {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: 5px;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 10px;
  z-index: 5;
  transition: transform 0.2s, background-color 0.2s;
  cursor: pointer;
}

.swipe-bar:hover {
  background: rgba(255, 255, 255, 1);
  transform: translateX(-50%) scaleY(1.2);
}

.screen.power-off {
  background: black !important;
}

/* // MODIFICATION : Masque aussi l'horloge centrale, les raccourcis et l'app caméra quand l'écran est éteint */
.screen.power-off .status-bar,
.screen.power-off .swipe-bar,
.screen.power-off .volume-hud,
.screen.power-off .dynamic-island-content,
.screen.power-off .lock-clock,
.screen.power-off .lockscreen-shortcuts,
.screen.power-off .camera-app {
  opacity: 0 !important;
  pointer-events: none !important;
}

.volume-hud {
  position: absolute;
  left: 8px;
  top: 140px;
  width: 12px;
  height: 100px;
  background: rgba(255,255,255,0.25);
  border-radius: 40px;
  z-index: 6;
  opacity: 0;
  transition: opacity 0.2s;
  overflow: hidden;
}

.volume-level {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: white;
  transition: height 0.1s ease;
}

/* // MODIFICATION : Ajout d'une transition pour permettre l'effet torche */
.flash-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  z-index: 9;
  pointer-events: none;
  transition: opacity 0.25s ease, background-color 0.25s ease;
}

/* // AJOUT : Effet lumineux quand la torche est activée */
.flash-overlay.torch-active {
  opacity: 0.34;
  background: radial-gradient(circle at 50% 78%, rgba(255, 255, 235, 0.92) 0%, rgba(255, 255, 210, 0.42) 42%, rgba(255, 255, 255, 0.10) 100%);
}

/* // AJOUT : Interface caméra intégrée au téléphone */
.camera-app {
  position: absolute;
  inset: 0;
  background: #050505;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transform: scale(1.04);
  transition: opacity 0.28s ease, transform 0.28s ease;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* // AJOUT : État ouvert de l'app caméra */
.camera-app.open {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
}

/* // AJOUT : Vidéo de la caméra réelle si le navigateur l'autorise */
.camera-preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: radial-gradient(circle at center, #1b1b1b 0%, #050505 70%);
}

/* // AJOUT : Message fallback si la caméra réelle n'est pas accessible */
.camera-fallback {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 28px;
  text-align: center;
  color: rgba(255, 255, 255, 0.78);
  font-size: 13px;
  line-height: 1.4;
  background: radial-gradient(circle at center, #202020 0%, #050505 72%);
}

/* // AJOUT : Affichage du fallback caméra */
.camera-app.fallback .camera-fallback {
  display: flex;
}

/* // AJOUT : Barre supérieure de l'app caméra */
.camera-topbar {
  position: absolute;
  top: 58px;
  left: 0;
  right: 0;
  padding: 0 18px;
  display: flex;
  justify-content: flex-end;
  z-index: 31;
}

/* // AJOUT : Bouton fermer caméra */
.camera-close {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(0, 0, 0, 0.45);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
}

/* // AJOUT : Taille icône fermer caméra */
.camera-close ion-icon {
  font-size: 22px;
}

/* // AJOUT : Barre inférieure de l'app caméra */
.camera-controls {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 31;
}

/* // AJOUT : Bouton déclencheur caméra visuel */
.shutter-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 4px solid white;
  background: rgba(255, 255, 255, 0.22);
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.22);
  cursor: pointer;
}

/* // AJOUT : Animation bouton déclencheur */
.shutter-btn:active {
  transform: scale(0.92);
}
</style>

<body>
  
  <div class="iphone">
    <div class="hw-button btn-action" id="btnAction" title="Bouton Action"></div>
    <div class="hw-button btn-vol-up" id="btnVolUp" title="Volume +"></div>
    <div class="hw-button btn-vol-down" id="btnVolDown" title="Volume -"></div>
    <div class="hw-button btn-power" id="btnPower" title="Bouton Power"></div>

    <div class="screen" id="phoneScreen">
      <div class="volume-hud" id="volHud"><div class="volume-level" id="volLevel"></div></div>
      <div class="flash-overlay" id="flashOverlay"></div>

      <div class="status-bar" id="statusBar">
        <span id="statusTime">00:00</span>
        <div class="status-icons">
          <ion-icon name="cellular"></ion-icon>
          <ion-icon name="wifi"></ion-icon>
          <ion-icon name="battery-full"></ion-icon>
        </div>
      </div>

      <!-- // AJOUT : Grande heure au centre de l'écran -->
      <div class="lock-clock" id="lockTime">00:00</div>

      <div class="dynamic-island" id="dynamicIsland">
        <div class="camera-lens"></div>
        <div class="dynamic-island-content" id="islandContent"></div>
      </div>
      
      <!-- // AJOUT : Icônes torche et caméra style écran verrouillé iOS -->
      <div class="lockscreen-shortcuts" id="lockscreenShortcuts">
        <div class="shortcut-btn" id="torchShortcut" title="Lampe torche">
          <ion-icon name="flashlight-outline"></ion-icon>
        </div>
        <div class="shortcut-btn" id="cameraShortcut" title="Caméra">
          <ion-icon name="camera-outline"></ion-icon>
        </div>
      </div>

      <!-- // AJOUT : Application caméra intégrée au téléphone -->
      <div class="camera-app" id="cameraApp">
        <video class="camera-preview" id="cameraPreview" autoplay playsinline muted></video>
        <div class="camera-fallback" id="cameraFallback">
          Caméra non disponible ou permission refusée.<br>
          Ouvre la page en HTTPS et autorise l'accès à la caméra.
        </div>
        <div class="camera-topbar">
          <button class="camera-close" id="cameraClose" title="Fermer la caméra">
            <ion-icon name="close"></ion-icon>
          </button>
        </div>
        <div class="camera-controls">
          <button class="shutter-btn" id="shutterBtn" title="Prendre une photo"></button>
        </div>
      </div>

      <div class="swipe-bar" id="swipeBar"></div>
    </div>
    
  </div>

</body>

<script>
  function triggerHaptic(duration = 15) {
  if ('vibrate' in navigator) {
    navigator.vibrate(duration);
  }
}

function updateClock() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  // MODIFICATION : Mise à jour de l'heure dans la barre de statut
  document.getElementById('statusTime').textContent = `${hours}:${minutes}`;
  // AJOUT : Mise à jour de la grande heure centrale
  document.getElementById('lockTime').textContent = `${hours}:${minutes}`;
}

setInterval(updateClock, 1000);
updateClock();

const screen = document.getElementById('phoneScreen');
const statusBar = document.getElementById('statusBar');

document.getElementById('btnPower').addEventListener('click', () => {
  triggerHaptic(25);
  screen.classList.toggle('power-off');
});

let currentVolume = 50;
let volTimeout;

function adjustVolume(amount) {
  if (screen.classList.contains('power-off')) return;
  triggerHaptic(10);
  currentVolume = Math.min(100, Math.max(0, currentVolume + amount));
  document.getElementById('volLevel').style.height = `${currentVolume}%`;
  const hud = document.getElementById('volHud');
  hud.style.opacity = '1';
  clearTimeout(volTimeout);
  volTimeout = setTimeout(() => hud.style.opacity = '0', 1500);
}

document.getElementById('btnVolUp').addEventListener('click', () => adjustVolume(10));
document.getElementById('btnVolDown').addEventListener('click', () => adjustVolume(-10));

let isSilent = true;
let actionTimeout;
const island = document.getElementById('dynamicIsland');
const islandContent = document.getElementById('islandContent');

document.getElementById('btnAction').addEventListener('click', () => {
  if (screen.classList.contains('power-off')) return;
  
  triggerHaptic(isSilent ? [15, 40, 15] : 20);
  isSilent = !isSilent;
  
  islandContent.innerHTML = isSilent 
    ? '<div style="display:flex; align-items:center; gap:4px;"><ion-icon name="notifications-off" style="color:#ff3b30; font-size:12px;"></ion-icon><span style="font-size:10px; color:#8e8e93;">Silencieux</span></div>' 
    : '<div style="display:flex; align-items:center; gap:4px;"><ion-icon name="notifications" style="color:#34c759; font-size:12px;"></ion-icon><span style="font-size:10px; color:#34c759;">Sonnerie</span></div>';
  
  island.classList.add('expanded');
  statusBar.classList.add('hidden');
  
  clearTimeout(actionTimeout);
  actionTimeout = setTimeout(() => {
    island.classList.remove('expanded');
    statusBar.classList.remove('hidden');
  }, 2000);
});

document.getElementById('swipeBar').addEventListener('click', () => {
  if (screen.classList.contains('power-off')) return;
  triggerHaptic(15);
  island.style.transform = 'translateX(-50%) scale(1.05)';
  setTimeout(() => island.style.transform = 'translateX(-50%)', 150);
});

// AJOUT : Références des raccourcis torche/caméra et de l'app caméra
const torchShortcut = document.getElementById('torchShortcut');
const cameraShortcut = document.getElementById('cameraShortcut');
const flashOverlay = document.getElementById('flashOverlay');
const cameraApp = document.getElementById('cameraApp');
const cameraPreview = document.getElementById('cameraPreview');
const cameraClose = document.getElementById('cameraClose');
const shutterBtn = document.getElementById('shutterBtn');

// AJOUT : Stocke le flux caméra pour pouvoir l'arrêter proprement
let cameraStream = null;

// AJOUT : Fonction d'animation de confirmation des raccourcis
function confirmShortcutAnimation(element) {
  element.classList.remove('confirmed');
  void element.offsetWidth;
  element.classList.add('confirmed');
  setTimeout(() => element.classList.remove('confirmed'), 300);
}

// AJOUT : Gestion générique de l'appui prolongé de 0.3s
function setupLongPressShortcut(element, callback) {
  let pressTimer = null;

  function startPress(event) {
    if (screen.classList.contains('power-off')) return;
    event.preventDefault();
    element.classList.add('pressing');

    pressTimer = setTimeout(() => {
      element.classList.remove('pressing');
      confirmShortcutAnimation(element);
      triggerHaptic([18, 25, 18]);
      callback();
    }, 300);
  }

  function cancelPress(event) {
    if (event) {
      event.preventDefault();
    }
    clearTimeout(pressTimer);
    element.classList.remove('pressing');
  }

  element.addEventListener('pointerdown', startPress);
  element.addEventListener('pointerup', cancelPress);
  element.addEventListener('pointerleave', cancelPress);
  element.addEventListener('pointercancel', cancelPress);
  element.addEventListener('contextmenu', (event) => event.preventDefault());
}

// AJOUT : Active ou désactive la torche visuelle après appui prolongé
function toggleTorch() {
  const isTorchActive = flashOverlay.classList.toggle('torch-active');
  torchShortcut.classList.toggle('active', isTorchActive);
}

// AJOUT : Ouvre l'app caméra du téléphone et tente d'utiliser la vraie caméra du navigateur
async function openCameraApp() {
  cameraApp.classList.add('open');
  cameraApp.classList.remove('fallback');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    cameraApp.classList.add('fallback');
    return;
  }

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment'
      },
      audio: false
    });
    cameraPreview.srcObject = cameraStream;
  } catch (error) {
    cameraApp.classList.add('fallback');
  }
}

// AJOUT : Ferme l'app caméra et stoppe le flux caméra si actif
function closeCameraApp() {
  cameraApp.classList.remove('open');

  if (cameraStream) {
    cameraStream.getTracks().forEach((track) => track.stop());
    cameraStream = null;
  }

  cameraPreview.srcObject = null;
}

// AJOUT : Appui prolongé de 0.3s sur l'icône torche
setupLongPressShortcut(torchShortcut, toggleTorch);

// AJOUT : Appui prolongé de 0.3s sur l'icône caméra
setupLongPressShortcut(cameraShortcut, openCameraApp);

// AJOUT : Bouton de fermeture de l'app caméra
cameraClose.addEventListener('click', () => {
  triggerHaptic(12);
  closeCameraApp();
});

// AJOUT : Animation haptique du déclencheur caméra
shutterBtn.addEventListener('click', () => {
  triggerHaptic(20);
  flashOverlay.style.opacity = '0.45';
  setTimeout(() => {
    flashOverlay.style.opacity = flashOverlay.classList.contains('torch-active') ? '0.34' : '0';
  }, 120);
});
</script>

</html>
